  # Compliance checklist
  checklist:
    agent_registration:
      - "✓ Risk classification specified and validated (ALL)"
      - "✓ Purpose documented with meaningful description (ALL)"
      - "✓ Detailed purpose for HIGH risk (50+ chars, HIGH only)"
      - "✓ Agent named for identification (ALL)"
      - "✓ Owner/provider designated (ALL)"
    runtime_enforcement:
      - "✓ Human approval gate before external calls (HIGH only)"
      - "✓ Human approval gate before write operations (HIGH only)"
      - "✓ PII gate verification before model calls (ALL)"
      - "✓ Execution limits prevent runaway behavior (ALL)"
    post_deployment:
      - "✓ Continuous logging enabled (via Kyvvu platform)"
      - "✓ Incident tracking active (via Kyvvu platform)"
      - "✓ Audit reports available (via Kyvvu platform)"