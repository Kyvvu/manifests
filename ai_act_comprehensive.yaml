# EU AI Act - Comprehensive Compliance Template
#
# This template implements policies for full EU AI Act compliance across
# all risk classifications (HIGH, LIMITED, MINIMAL) using two evaluation scopes:
# agent_registration (registration-time checks) and step_execution (runtime checks).
#
# Based on: Regulation (EU) 2024/1689 (Official Journal, July 12, 2024)
# Template Version: 1.2
# Last Updated: January 19, 2026
#
# STRUCTURE:
# 1. AGENT REGISTRATION POLICIES (Articles 6, 11, 13, 16, Annex III, IV, VIII)
# 2. STEP EXECUTION POLICIES (Articles 10, 14, 15, 50, 72)
#
# Each policy includes:
# - Name: Human-readable policy name
# - Description: What the policy enforces and why
# - Rule_type: Which rule function to use
# - Params: Parameters for the rule
# - Severity: Impact level (low, medium, high, critical)
# - Scope: When to evaluate (agent_registration, step_execution, task_execution)
# - Risk_classification: Which agents this applies to (HIGH, LIMITED, MINIMAL, or omitted for ALL)
# - EU AI Act Reference: Which article(s) this addresses

name: "EU AI Act - Comprehensive Compliance"
description: |
  Complete policy set for EU AI Act compliance covering HIGH, LIMITED, and MINIMAL
  risk AI systems. Implements requirements from Articles 6-27, 49-50, 72-73, and
  Annexes III, IV, VIII.
  
  This template ensures:
  - Proper agent registration and documentation (Chapter III, Section 2)
  - Human oversight requirements (Article 14)
  - Transparency obligations (Articles 13, 50)
  - Record-keeping and logging (Articles 12, 18, 19)
  - Post-market monitoring (Article 72)
  
  Policies are automatically filtered by risk classification:
  - Policies without risk_classification apply to ALL agents
  - Policies with risk_classification: HIGH only apply to HIGH risk agents
  - Policies with risk_classification: LIMITED only apply to LIMITED risk agents
  - Policies with risk_classification: MINIMAL only apply to MINIMAL risk agents

version: "1.1"

# ============================================================================
# SECTION 1: AGENT REGISTRATION POLICIES
# ============================================================================
# These policies evaluate when an agent is registered or updated.
# They enforce documentation, transparency, and classification requirements.
# Articles covered: 6, 11, 13, 16, Annex III, Annex IV, Annex VIII

policies:
  # --------------------------------------------------------------------------
  # Article 6: Risk Classification (ALL AGENTS)
  # HIGH risk AI systems must be properly classified per Annex III
  # --------------------------------------------------------------------------

  - name: "Agent must specify risk classification"
    description: |
      EU AI Act Article 6 requires AI systems to be classified by risk level.
      This policy ensures every agent declares its risk classification during
      registration (HIGH, LIMITED, MINIMAL, or UNACCEPTABLE).
      
      Risk classification determines which compliance obligations apply.
      
      Applies to: ALL agents (HIGH, LIMITED, MINIMAL)
    rule_type: field_not_empty
    params:
      field: risk_classification
    severity: critical
    scope: agent_registration
    # EU AI Act Reference: Article 6
    # No risk_classification filter - applies to all agents

  - name: "Risk classification must be valid"
    description: |
      Validates that risk_classification uses only permitted values as defined
      in Article 6 and Annex III. UNACCEPTABLE systems should not be deployed.
      
      Valid values:
      - HIGH: Annex III applications (employment, law enforcement, critical infrastructure, etc.)
      - LIMITED: Systems requiring transparency (chatbots, emotion recognition, etc.)
      - MINIMAL: Low-risk AI with no specific obligations
      
      Applies to: ALL agents (HIGH, LIMITED, MINIMAL)
    rule_type: field_in_list
    params:
      field: risk_classification
      values: ["high", "limited", "minimal"]
    severity: critical
    scope: agent_registration
    # EU AI Act Reference: Article 6, Annex III
    # No risk_classification filter - applies to all agents

  # --------------------------------------------------------------------------
  # Article 11, 13, Annex IV: Technical Documentation & Transparency (ALL)
  # Providers must maintain comprehensive documentation
  # --------------------------------------------------------------------------

  - name: "Agent must have documented purpose"
    description: |
      EU AI Act Article 11 and 13 require clear documentation of AI system purpose.
      Article 13 specifically requires instructions for use that enable deployers
      to interpret the system's output and use it appropriately.
      
      The purpose field must be populated to meet documentation requirements.
      
      Applies to: ALL agents (HIGH, LIMITED, MINIMAL)
    rule_type: field_not_empty
    params:
      field: purpose
    severity: high
    scope: agent_registration
    # EU AI Act Reference: Article 11(1), Article 13(3)(b)(i), Annex IV(1)
    # No risk_classification filter - applies to all agents

  - name: "Agent purpose must be meaningful"
    description: |
      Purpose documentation must be substantive, not placeholder text.
      Minimum 20 characters ensures meaningful description rather than
      "test" or "demo" placeholders.
      
      This supports Article 11's requirement for detailed technical documentation
      and Article 13's requirement for clear instructions for use.
      
      Applies to: ALL agents (HIGH, LIMITED, MINIMAL)
    rule_type: field_matches_regex
    params:
      field: purpose
      pattern: "^.{20,}$"
    severity: high
    scope: agent_registration
    # EU AI Act Reference: Article 11(1), Article 13(3)(b), Annex IV(1)
    # No risk_classification filter - applies to all agents

  - name: "Agent must have identifying name"
    description: |
      AI systems must be clearly identifiable per EU AI Act transparency requirements.
      Article 13 requires that deployers can identify the AI system and understand
      its characteristics.
      
      Every agent must have a non-empty name field for identification.
      
      Applies to: ALL agents (HIGH, LIMITED, MINIMAL)
    rule_type: field_not_empty
    params:
      field: name
    severity: high
    scope: agent_registration
    # EU AI Act Reference: Article 13(3)(a), Annex IV(1)
    # No risk_classification filter - applies to all agents

  # --------------------------------------------------------------------------
  # Article 16: Provider Obligations - Accountability (ALL)
  # Providers must be identifiable for quality management system
  # --------------------------------------------------------------------------

  - name: "Agent must have designated owner"
    description: |
      EU AI Act Article 16 establishes provider obligations including maintaining
      a quality management system and taking responsibility for the AI system.
      
      Each agent must have a designated owner_id indicating who is the provider
      responsible for this AI system per Article 16(a) and Article 9.
      
      Applies to: ALL agents (HIGH, LIMITED, MINIMAL)
    rule_type: field_not_empty
    params:
      field: owner_id
    severity: high
    scope: agent_registration
    # EU AI Act Reference: Article 16(a), Article 9 (Risk Management System)
    # No risk_classification filter - applies to all agents

  - name: "Agent should have designated maintainer"
    description: |
      While not explicitly required by AI Act, having a maintainer supports
      Article 16's provider obligations and Article 17's quality management
      system requirements.
      
      Maintainer enables clear assignment of ongoing system oversight and
      corrective actions per Article 20.
      
      Applies to: ALL agents (HIGH, LIMITED, MINIMAL)
    rule_type: field_not_empty
    params:
      field: maintainer_id
    severity: medium
    scope: agent_registration
    # EU AI Act Reference: Article 16, Article 17 (Quality Management), Article 20 (Corrective Actions)
    # No risk_classification filter - applies to all agents

  # --------------------------------------------------------------------------
  # Article 13, 50: Transparency Requirements (HIGH RISK ONLY)
  # Users must be informed about AI system characteristics
  # --------------------------------------------------------------------------

  - name: "HIGH risk agents must have detailed purpose documentation"
    description: |
      Article 13(3)(b) requires that instructions for use for high-risk AI systems
      contain detailed information to enable deployers to properly interpret outputs.
      
      For HIGH risk systems, purpose must be particularly detailed (minimum 50 chars)
      to adequately describe intended use, capabilities, and limitations.
      
      Applies to: HIGH risk agents only
    rule_type: field_matches_regex
    params:
      field: purpose
      pattern: "^.{50,}$"
    severity: high
    scope: agent_registration
    risk_classification: high
    # EU AI Act Reference: Article 13(3)(b), Annex IV(2)

  # --------------------------------------------------------------------------
  # Annex VIII: Registration Information for EU Database (ALL)
  # Article 49 requires registration in EU database
  # --------------------------------------------------------------------------

  - name: "Agent should specify deployment environment"
    description: |
      Annex VIII requires information about where the high-risk AI system
      is deployed. The environment field (development/production) helps track deployment status.
      
      While not a complete solution for Article 49 registration requirements,
      this supports documentation of deployment context.
      
      Applies to: ALL agents (HIGH, LIMITED, MINIMAL)
    rule_type: field_not_empty
    params:
      field: environment
    severity: low
    scope: agent_registration
    # EU AI Act Reference: Annex VIII (Registration Information)
    # No risk_classification filter - applies to all agents

# ============================================================================
# SECTION 2: STEP EXECUTION POLICIES
# ============================================================================
# These policies evaluate at each step during agent task execution.
# They enforce human oversight, data governance, and operational requirements.
# Articles covered: 10, 14, 15, 50

  # --------------------------------------------------------------------------
  # Article 14: Human Oversight (HIGH RISK ONLY)
  # HIGH risk AI systems must enable effective human oversight
  # --------------------------------------------------------------------------

  - name: "HIGH risk agents - External calls require human approval"
    description: |
      Article 14(4)(d) requires high-risk AI systems to enable humans to
      decide not to use the AI system or to disregard, override, or reverse
      its output.

      For HIGH risk agents making external API calls, this policy requires
      a step.gate immediately before the external call to ensure meaningful
      human oversight.

      Applies to: HIGH risk agents only
    rule_type: step_directly_preceded_by
    params:
      required_step_type: step.gate
      target_step_types: ["step.resource"]
    severity: critical
    scope: step_execution
    risk_classification: high
    # EU AI Act Reference: Article 14(4)(d), Article 14(5)

  - name: "HIGH risk agents - Write operations require human approval"
    description: |
      Article 14(4)(c) requires oversight measures including the ability to
      interrupt the system. For write operations that could modify data or
      take actions, a human approval gate is required.

      Applies to: HIGH risk agents only
    rule_type: step_directly_preceded_by
    params:
      required_step_type: step.gate
      target_step_types: ["step.resource"]
      target_verb: POST
    severity: critical
    scope: step_execution
    risk_classification: high
    # EU AI Act Reference: Article 14(4)(c), Article 14(5)

  # --------------------------------------------------------------------------
  # Article 10: Data Governance (HIGH RISK ONLY)
  # Training, validation, and testing data must be of high quality
  # --------------------------------------------------------------------------

  - name: "HIGH risk - PII verification required before LLM calls"
    description: |
      Article 10(3) requires that data sets be relevant, representative, and
      free of errors. Article 10(5) requires appropriate safeguards for
      special categories of personal data.

      This policy requires a PII verification gate before sending data to
      model providers, ensuring compliance with data quality and protection
      requirements.

      Applies to: HIGH risk agents only
    rule_type: step_requires_predecessor
    params:
      required_step_type: step.gate
      target_step_types: ["step.model"]
    severity: high
    scope: step_execution
    risk_classification: high
    # EU AI Act Reference: Article 10(3), Article 10(5)

  - name: "HIGH risk - Data quality checks required"
    description: |
      Article 10(2): Data governance measures must include examination regarding
      biases and appropriate data processing measures to detect and correct biases.

      Require a data quality gate before resource or model operations to ensure
      data meets Article 10 requirements for relevance and accuracy.

      Applies to: HIGH risk agents only
    rule_type: step_requires_predecessor
    params:
      required_step_type: step.gate
      target_step_types: ["step.resource", "step.model"]
    severity: medium
    scope: step_execution
    risk_classification: high
    # EU AI Act Reference: Article 10(2), Article 10(3)

  # --------------------------------------------------------------------------
  # Article 15: Accuracy, Robustness and Cybersecurity (ALL AGENTS)
  # Systems must achieve appropriate accuracy and be resilient
  # --------------------------------------------------------------------------

  - name: "Limit external calls to prevent abuse"
    description: |
      Article 15(3) requires that high-risk AI systems be resilient as regards
      attempts by unauthorized third parties to alter their use or performance.

      This policy limits step.resource calls to prevent potential abuse,
      unauthorized modifications, or adversarial attacks.

      Applies to: ALL agents (HIGH, LIMITED, MINIMAL)
    rule_type: execution_max_steps
    params:
      max_steps: 50
      step_type: step.resource
    severity: medium
    scope: step_execution
    # EU AI Act Reference: Article 15(1), Article 15(3)
    # No risk_classification filter - applies to all agents

  # --------------------------------------------------------------------------
  # Article 50: Transparency Obligations (LIMITED RISK ONLY)
  # Users must be informed when interacting with AI
  # --------------------------------------------------------------------------

  - name: "Emotion recognition must disclose to users"
    description: |
      Article 50(2) requires that deployers of emotion recognition or biometric
      categorization systems inform natural persons when they are subject to
      such systems.

      Require a user disclosure gate (step.gate) before model steps that
      perform emotion recognition or biometric categorization.

      Applies to: ALL agents (HIGH, LIMITED, MINIMAL) using emotion recognition
    rule_type: step_requires_predecessor
    params:
      required_step_type: step.gate
      target_step_types: ["step.model"]
    severity: critical
    scope: step_execution
    # EU AI Act Reference: Article 50(2)
    # No risk_classification filter - applies to all agents using these step types

  - name: "AI-generated content must be disclosed"
    description: |
      Article 50(3) requires that deployers of AI systems that generate synthetic
      audio, image, video, or text content shall ensure that the outputs are
      marked in a machine-readable format and detectable as artificially generated.

      Require a content marking gate (step.gate) immediately before model steps
      that generate content.

      Applies to: ALL agents (HIGH, LIMITED, MINIMAL) generating content
    rule_type: step_directly_preceded_by
    params:
      required_step_type: step.gate
      target_step_types: ["step.model"]
    severity: high
    scope: step_execution
    # EU AI Act Reference: Article 50(3), Article 50(4)
    # No risk_classification filter - applies to all agents generating content

  # --------------------------------------------------------------------------
  # Article 72: Post-Market Monitoring (HIGH RISK ONLY)
  # Providers must actively monitor AI system performance
  # --------------------------------------------------------------------------

  - name: "HIGH risk agents - Tasks should not exceed reasonable duration"
    description: |
      Article 72 requires providers to establish a post-market monitoring system
      to actively and systematically collect and analyze data on performance.

      Tasks exceeding 100 step.resource calls may indicate performance issues,
      errors, or unexpected behavior that should be monitored per Article 72.

      Applies to: HIGH risk agents only
    rule_type: execution_max_steps
    params:
      max_steps: 100
      step_type: step.resource
    severity: medium
    scope: step_execution
    risk_classification: high
    # EU AI Act Reference: Article 72(1)

# ============================================================================
# OPTIONAL: BEST PRACTICES FOR MINIMAL RISK SYSTEMS
# ============================================================================
# These policies are voluntary but recommended for MINIMAL risk systems
# per Article 95 (Voluntary Codes of Conduct)

  - name: "MINIMAL risk - Basic documentation recommended"
    description: |
      While not required by EU AI Act for MINIMAL risk systems, Article 95
      encourages voluntary codes of conduct.
      
      Basic documentation (name and purpose) is recommended best practice even
      for MINIMAL risk AI systems.
      
      Applies to: MINIMAL risk agents only
    rule_type: field_not_empty
    params:
      field: purpose
    severity: low
    scope: agent_registration
    risk_classification: minimal
    # EU AI Act Reference: Article 95 (Voluntary Codes of Conduct)

  - name: "MINIMAL risk - Reasonable execution limits recommended"
    description: |
      Voluntary best practice: Even MINIMAL risk systems benefit from execution
      limits to prevent runaway behavior and resource exhaustion.

      Recommended maximum 100 step.resource calls per task.

      Applies to: MINIMAL risk agents only
    rule_type: execution_max_steps
    params:
      max_steps: 100
      step_type: step.resource
    severity: low
    scope: step_execution
    risk_classification: minimal
    # EU AI Act Reference: Article 95 (Voluntary Codes of Conduct)

# ============================================================================
# POLICY TEMPLATE METADATA
# ============================================================================

metadata:
  # This template covers the following EU AI Act articles:
  articles_covered:
    - "Article 6: Classification rules for high-risk AI systems"
    - "Article 10: Data and data governance"
    - "Article 11: Technical documentation"
    - "Article 13: Transparency and provision of information to deployers"
    - "Article 14: Human oversight"
    - "Article 15: Accuracy, robustness and cybersecurity"
    - "Article 16: Obligations of providers of high-risk AI systems"
    - "Article 50: Transparency obligations for certain AI systems"
    - "Article 72: Post-market monitoring"
    - "Article 95: Codes of conduct (voluntary)"
    - "Annex III: High-risk AI systems"
    - "Annex IV: Technical documentation requirements"
    - "Annex VIII: Registration information"

  # Policy count by scope
  policy_count:
    agent_registration: 10  # 9 general/HIGH + 1 MINIMAL voluntary
    step_execution: 11  # human oversight, data governance, robustness, transparency
    total: 21

  # Policy count by risk classification
  risk_classification_coverage:
    ALL: 10  # Apply to all agents regardless of risk
    HIGH: 7  # HIGH risk-specific (Articles 10, 13, 14, 72)
    MINIMAL: 2  # MINIMAL risk-specific (Article 95 voluntary)
    CONDITIONAL: 2  # Apply based on step types used (emotion recognition, content generation)

  # Implementation notes
  notes:
    - "Policies without risk_classification field apply to ALL agents"
    - "Policies with risk_classification: HIGH only apply to HIGH risk agents"
    - "Policies with risk_classification: LIMITED only apply to LIMITED risk agents"
    - "Policies with risk_classification: MINIMAL only apply to MINIMAL risk agents"
    - "Runtime policies use SDK step types: step.gate (human approval / verification gates),
       step.model (LLM / model calls), step.resource (external API / tool calls)"
    - "This template provides comprehensive coverage but should be customized based on:
       1. Your specific agent use cases
       2. Risk classification of each agent
       3. Applicable Annex III categories
       4. Sector-specific requirements"

  # Future enhancements
  enhancements_possible:
    - "Authority notification workflow (Articles 20, 73)"
    - "EU database integration (Articles 49, 71)"
    - "Automated FRIA generation (Article 27)"
    - "Explanation report generation (Article 86)"
    - "Prohibited use pattern detection (Article 5)"