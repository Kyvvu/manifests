name: "Kyvvu Demo - Getting Started"
description: |
  Starter manifest for new Kyvvu installations. Contains two very
  basic governance policies: one registration requirement and one
  runtime guard-rail.

version: "1.0"

policies:
  - name: "Agent Purpose Required"
    description: |
      All agents must have a documented purpose as required by
      EU AI Act Article 13. Severity high will raise a warning.
    rule_type: field_not_empty
    params:
      field: purpose
    severity: high
    scope: agent_registration

  - name: "Max LLM calls per task"
    description: |
      Guard-rail: limits the total number of step.model (LLM inference)
      calls within a single task execution. Tune max_steps to match
      your agent's expected workload. Severity critical will rais an Error.
    rule_type: execution_max_steps
    params:
      step_type: step.model
      max_steps: 2
    severity: critical
    scope: step_execution
