# SPDX-License-Identifier: Apache-2.0
#
# OWASP Top 10 for Agentic Applications (2026) - Default Kyvvu Template
#
# Eight policies covering the OWASP Top 10 for Agentic Applications (ASI01-ASI10)
# at agent *development time*. This is the recommended default for new Kyvvu
# installations: every policy works on day one with zero per-deployment tuning.
#
# Based on: OWASP Top 10 for Agentic Applications, December 2025 release
#           https://genai.owasp.org/resource/owasp-top-10-for-agentic-applications-for-2026/
# Template Version: 1.0
# Last Updated: April 29, 2026
#
# DESIGN PRINCIPLES:
# - Immediate value on install: no regex/domain/budget configuration required
# - Structural over content-based: catches missing gates, runaway loops,
#   undeclared tools - not environment-specific patterns
# - Demonstrates path-dependence: policies #7 and #8 read task history,
#   showcasing Kyvvu's core thesis (policies on paths, not on points)
#
# OWASP RISKS COVERED:
# - ASI01 Agent Goal Hijack          (policies 1, 7)
# - ASI02 Tool Misuse & Exploitation (policies 2, 4, 6, 8)
# - ASI04 Agentic Supply Chain       (policies 2, 4 - partial)
# - ASI05 Unexpected Code Execution  (policy 5)
# - ASI06 Memory & Context Poisoning (policy 7)
# - ASI08 Cascading Failures         (policy 8)
# - ASI09 Human-Agent Trust Exploit  (policies 5, 6, 7)
# - ASI10 Rogue Agents               (policy 1 - partial)
#
# ACKNOWLEDGED GAPS (out of scope for default; see expansion_path below):
# - ASI03 Identity & Privilege Abuse: requires step.credential events,
#   typically not emitted in dev. Add credential-taint policy in production.
# - ASI07 Insecure Inter-Agent Comms: belongs in transport/identity layer
#   (mTLS, signed agent cards), not runtime policy.

name: "OWASP Top 10 for Agentic Applications - Default Security Template"
description: |
  Default security policy set for new Kyvvu installations, providing baseline
  coverage of the OWASP Top 10 for Agentic Applications (2026) at agent
  development time.

  This template implements the structural minimum for safe agent operation:
  - Explicit, version-controlled goals and tool allowlists (registration)
  - Mandatory gates on irreversible and high-impact actions (step execution)
  - Path-dependent enforcement when external content has entered the task
  - Bounds on runaway behaviour

  Pair with a compliance template (e.g. EU AI Act) for regulatory coverage.

version: "1.0.0"

policies:
  # ==========================================================================
  # AGENT REGISTRATION - GOAL & CAPABILITY DECLARATION
  # ==========================================================================
  # Mitigates ASI01 (Goal Hijack), ASI02 (Tool Misuse), ASI04 (Supply Chain),
  # ASI10 (Rogue Agents). The OWASP-recommended first-line mitigation for
  # goal hijacking and rogue behaviour is "make agent goals explicit,
  # auditable, and version-controlled" - which is unenforceable at runtime
  # if the agent never declared them.

  - name: "Agent must declare a substantive purpose"
    description: |
      ASI01 (Agent Goal Hijack), ASI10 (Rogue Agents):
      Without an explicit, written purpose, drift cannot be detected and
      goal hijacking has no baseline to violate. Requires at least 30
      characters to prevent placeholder values like "chat" or "assistant".

      Applies to: ALL agents.
    rule_type: field_matches_regex
    params:
      field: purpose
      pattern: "^.{30,}$"
    severity: high
    scope: agent_registration

  - name: "Agent must declare a tool allowlist"
    description: |
      ASI02 (Tool Misuse), ASI04 (Supply Chain):
      Least-agency is unenforceable if intended tools are not enumerated.
      This policy is the precondition for runtime policy
      (step_name_in_allowlist) - together they implement least-agency.

      Applies to: ALL agents.
    rule_type: field_not_empty
    params:
      field: declared_tools
    severity: high
    scope: agent_registration

  - name: "Agent must declare a valid risk classification"
    description: |
      Enables classification-aware downstream policies and bridges to
      EU AI Act Article 6 (risk classification) for installations that
      add the AI Act compliance template alongside this one.

      Applies to: ALL agents.
    rule_type: field_in_list
    params:
      field: risk_classification
      values: ["high", "limited", "minimal"]
    severity: critical
    scope: agent_registration

  # ==========================================================================
  # STEP EXECUTION - LEAST AGENCY ENFORCEMENT
  # ==========================================================================
  # Mitigates ASI02 (Tool Misuse), ASI04 (Supply Chain).

  - name: "Tool calls must be in the declared allowlist"
    description: |
      ASI02 (Tool Misuse), ASI04 (Supply Chain):
      Pairs with registration policy. At runtime, blocks tool calls whose
      step_name is not in the agent's declared_tools allowlist.

      Catches typosquatting, supply-chain swap-ins, and silent capability
      creep as the agent's prompt evolves.

      Applies to: ALL agents.
    rule_type: step_name_in_allowlist
    params:
      agent_field: declared_tools
      target_step_types: ["step.resource", "step.exec", "step.credential", "step.message", "step.self"]
    severity: critical
    scope: step_execution

  # ==========================================================================
  # STEP EXECUTION - HUMAN OVERSIGHT ON HIGH-IMPACT ACTIONS
  # ==========================================================================
  # Mitigates ASI05 (Unexpected Code Execution), ASI09 (Human-Agent Trust
  # Exploitation). Both OWASP entries explicitly recommend human approval
  # gates as a primary mitigation.

  - name: "Code execution requires a preceding gate"
    description: |
      ASI05 (Unexpected Code Execution):
      Direct mitigation for OWASP's most concrete RCE-class threat.
      Any step.exec must be preceded by a step.gate (human approval,
      static check, or sandboxed dry-run).

      Applies to: ALL agents.
    rule_type: step_requires_gate
    params:
      target_step_types: ["step.exec"]
    severity: critical
    scope: step_execution

  - name: "Destructive resource operations require a preceding gate"
    description: |
      ASI09 (Human-Agent Trust Exploitation):
      DELETE is the bright-line irreversible verb. The default narrows to
      DELETE only (not POST/PATCH) so dev-time iteration is not constantly
      blocked; production deployments typically widen this to mutating
      verbs as confidence in the agent grows.

      Applies to: ALL agents.
    rule_type: step_requires_gate
    params:
      target_step_types: ["step.resource"]
      target_verb: DELETE
    severity: critical
    scope: step_execution

  # ==========================================================================
  # STEP EXECUTION - PATH-DEPENDENT TAINT ENFORCEMENT
  # ==========================================================================
  # Mitigates ASI01 (Goal Hijack), ASI06 (Memory Poisoning), ASI09.
  #
  # This is the demonstration policy for Kyvvu's core thesis: decisions
  # depend on the FULL ORDERED HISTORY of the task, not just the current
  # step. The same step.exec call is allowed or blocked depending on what
  # the agent has already done.

  - name: "External content taint: high-impact actions require a fresh gate"
    description: |
      ASI01 (Agent Goal Hijack), ASI06 (Memory & Context Poisoning),
      ASI09 (Human-Agent Trust Exploitation):

      If the agent has fetched external content earlier in this task,
      any subsequent high-impact action (code execution, outbound message,
      destructive or mutating resource call) must be IMMEDIATELY preceded
      by a step.gate. A single approval at task start does not whitewash
      the rest of the path - oversight must be re-confirmed AFTER external
      influence has entered the context.

      This addresses the EchoLeak / indirect prompt injection pattern:
      malicious instructions hidden in retrieved content silently redirect
      the agent's plan. By requiring fresh approval after every external
      ingestion, the policy forces the human (or a downstream policy gate)
      to re-validate intent before any irreversible action.

      Convention: requires step.resource GETs to set the property
      target.trust = "external" when fetching content from outside an
      internal allowlist.

      This is a path-dependent compound policy and is the headline
      demonstration of "policies on paths".

      Applies to: ALL agents.
    rule_type: not
    params:
      condition:
        rule_type: all_of
        params:
          conditions:
            - rule_type: any_of
              params:
                conditions:
                  - rule_type: current_is
                    params:
                      step_type: step.exec
                  - rule_type: current_is
                    params:
                      step_type: step.message
                      verb: POST
                  - rule_type: current_is
                    params:
                      step_type: step.resource
                      verb: POST
                  - rule_type: current_is
                    params:
                      step_type: step.resource
                      verb: PATCH
                  - rule_type: current_is
                    params:
                      step_type: step.resource
                      verb: DELETE
            - rule_type: history_contains
              params:
                step_type: step.resource
                verb: GET
                property_filter:
                  target.trust: external
            - rule_type: not
              params:
                condition:
                  rule_type: step_directly_preceded_by
                  params:
                    required_step_type: step.gate
    severity: critical
    scope: step_execution

  # ==========================================================================
  # STEP EXECUTION - RUNAWAY PREVENTION
  # ==========================================================================
  # Mitigates ASI08 (Cascading Failures), ASI02 (looping/DoS sub-pattern).

  - name: "Bound resource calls per task to prevent runaway loops"
    description: |
      ASI08 (Cascading Failures), ASI02 (Tool Misuse - looping pattern):
      Blocks tasks that issue more than 50 step.resource calls.

      Catches the most common dev-time embarrassment: an agent stuck in
      a tool-call loop, which under OWASP's framing is both a DoS/cost
      issue and a precursor to cascading failures across connected agents.

      50 is generous enough that legitimate multi-step workflows do not
      hit it; production deployments typically tighten per-agent based
      on observed normal behaviour.

      Applies to: ALL agents.
    rule_type: execution_max_steps
    params:
      step_type: step.resource
      max_steps: 50
    severity: high
    scope: step_execution

metadata:
  template_type: "default_security"
  source_framework: "OWASP Top 10 for Agentic Applications (2026)"
  source_url: "https://genai.owasp.org/resource/owasp-top-10-for-agentic-applications-for-2026/"

  owasp_risks_covered:
    ASI01_goal_hijack:
      coverage: "strong"
      policies:
        - "Agent must declare a substantive purpose"
        - "External content taint: high-impact actions require a fresh gate"
    ASI02_tool_misuse:
      coverage: "strong"
      policies:
        - "Agent must declare a tool allowlist"
        - "Tool calls must be in the declared allowlist"
        - "Destructive resource operations require a preceding gate"
        - "Bound resource calls per task to prevent runaway loops"
    ASI03_identity_privilege_abuse:
      coverage: "gap"
      notes: "Add credential-taint policy when deployment emits credential events."
    ASI04_supply_chain:
      coverage: "partial"
      policies:
        - "Agent must declare a tool allowlist"
        - "Tool calls must be in the declared allowlist"
    ASI05_unexpected_code_execution:
      coverage: "strong"
      policies:
        - "Code execution requires a preceding gate"
    ASI06_memory_context_poisoning:
      coverage: "partial"
      policies:
        - "External content taint: high-impact actions require a fresh gate"
    ASI07_insecure_inter_agent_comms:
      coverage: "out_of_scope"
      notes: "Transport-layer concern (mTLS, signed agent cards)."
    ASI08_cascading_failures:
      coverage: "moderate"
      policies:
        - "Bound resource calls per task to prevent runaway loops"
    ASI09_human_agent_trust_exploitation:
      coverage: "strong"
      policies:
        - "Code execution requires a preceding gate"
        - "Destructive resource operations require a preceding gate"
        - "External content taint: high-impact actions require a fresh gate"
    ASI10_rogue_agents:
      coverage: "partial"
      policies:
        - "Agent must declare a substantive purpose"

  policy_count:
    agent_registration: 3
    step_execution: 5
    total: 8

  deliberate_exclusions:
    - rule: "pii_in_request"
      reason: "Requires patterns parameter with no defaults."
    - rule: "domain_allowlist"
      reason: "Environment-specific. No sensible default."
    - rule: "usage_budget"
      reason: "Requires deployment to wire up usage properties."
    - rule: "working_hours_only"
      reason: "Assumes deployment context absent in dev environments."

  expansion_path:
    - priority: 1
      add: "Credential taint policy (step_not_after with step.credential)"
      covers: "ASI03 Identity & Privilege Abuse"
    - priority: 2
      add: "PII gate before model calls (pii_in_request)"
      covers: "ASI06 + EU AI Act Article 10"
    - priority: 3
      add: "Domain allowlist for step.resource GETs"
      covers: "Closes the external content question for taint policy"
    - priority: 4
      add: "Cost ceiling (usage_budget over usage.cost_usd)"
      covers: "ASI08 economic-DoS sub-pattern"
