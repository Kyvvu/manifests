# EU AI Act - Basic Compliance Template
# 
# This template implements essential policies for EU AI Act Article 13 compliance.
# Article 13 requires transparency and information provision for AI systems.
#
# Key requirements covered:
# - AI systems must be clearly identifiable
# - Purpose must be documented
# - Users must be informed of AI system capabilities and limitations

name: "EU AI Act - Basic Compliance"
description: |
  Essential policies for EU AI Act Article 13 compliance. Ensures AI agents 
  have proper documentation including purpose, identification, and risk classification.
  
  This template applies to agent registration and ensures minimum documentation
  requirements are met before an AI agent can be deployed.
  
  These basic policies apply to ALL agents regardless of risk classification.

version: "1.0"

policies:
  - name: "Agent must have documented purpose"
    description: |
      EU AI Act Article 13 requires clear documentation of AI system purpose.
      This policy ensures the 'purpose' field is not empty during agent registration.
      
      Applies to: ALL agents (HIGH, LIMITED, MINIMAL)
    rule_type: field_not_empty
    params:
      field: purpose
    severity: high
    scope: agent_registration
    # No risk_classification filter - applies to all agents

  - name: "Agent must have identifying name"
    description: |
      AI systems must be clearly identifiable per EU AI Act requirements.
      This ensures every agent has a non-empty name field.
      
      Applies to: ALL agents (HIGH, LIMITED, MINIMAL)
    rule_type: field_not_empty
    params:
      field: name
    severity: high
    scope: agent_registration
    # No risk_classification filter - applies to all agents

  - name: "Agent must specify risk classification"
    description: |
      EU AI Act requires risk classification of AI systems (HIGH, LIMITED, MINIMAL).
      This policy ensures risk_classification is documented.
      
      Applies to: ALL agents (HIGH, LIMITED, MINIMAL)
    rule_type: field_not_empty
    params:
      field: risk_classification
    severity: high
    scope: agent_registration
    # No risk_classification filter - applies to all agents

  - name: "Agent must have designated owner"
    description: |
      EU AI Act requires clear accountability. Each agent must have a designated
      owner_id indicating who is responsible for this AI system.
      
      Applies to: ALL agents (HIGH, LIMITED, MINIMAL)
    rule_type: field_not_empty
    params:
      field: owner_id
    severity: medium
    scope: agent_registration
    # No risk_classification filter - applies to all agents

  - name: "Agent purpose must be meaningful"
    description: |
      Purpose field must contain substantive description (minimum 20 characters).
      This ensures meaningful documentation rather than placeholder text.
      
      Applies to: ALL agents (HIGH, LIMITED, MINIMAL)
    rule_type: field_matches_regex
    params:
      field: purpose
      pattern: "^.{20,}$"
    severity: medium
    scope: agent_registration
    # No risk_classification filter - applies to all agents

  - name: "Risk classification must be valid"
    description: |
      Risk classification must be one of the EU AI Act defined categories:
      HIGH, LIMITED, or MINIMAL.
      
      Applies to: ALL agents (HIGH, LIMITED, MINIMAL)
    rule_type: field_in_list
    params:
      field: risk_classification
      values: ["high", "limited", "minimal"]
    severity: high
    scope: agent_registration
    # No risk_classification filter - applies to all agents